# ============================================================
# 中间件服务配置
# ============================================================
# 数据持久化策略：
# - 数据存储在 WSL2 DockerData distro 的 ext4 文件系统
# - 根路径通过 .env 的 VOLUME_BASE 配置
# - Windows 端通过 \\wsl.localhost\DockerData\home\knowlebase\ 访问
# - ext4 下 chown 原生速度，无需 named volume
# ============================================================

services:
  # 关系数据库：存储用户信息、文档元数据、系统配置等结构化数据
  postgres:
    image: postgres:15-alpine
    container_name: knowlebase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-knowlebase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knowlebase_password}
      POSTGRES_DB: ${POSTGRES_DB:-knowlebase}
      TZ: Asia/Shanghai
    volumes:
      - ${VOLUME_BASE}/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowlebase"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - knowlebase-network

  # 全文检索引擎：关键词搜索、文档内容索引
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: knowlebase-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - cluster.name=knowlebase-cluster
      - TZ=Asia/Shanghai
    volumes:
      - ${VOLUME_BASE}/elasticsearch:/usr/share/elasticsearch/data
      - ./config/elasticsearch/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
      - ./config/elasticsearch/plugins:/usr/share/elasticsearch/plugins
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\"\\s*:\\s*\"green\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - knowlebase-network

  # 向量数据库：语义搜索、向量相似性检索
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: knowlebase-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - TZ=Asia/Shanghai
    volumes:
      - ${VOLUME_BASE}/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - knowlebase-network

  # Milvus依赖：元数据存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: knowlebase-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
      - TZ=Asia/Shanghai
    volumes:
      - ${VOLUME_BASE}/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - knowlebase-network

  # Milvus依赖：对象存储
  minio:
    image: minio/minio:latest
    container_name: knowlebase-minio
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - TZ=Asia/Shanghai
    volumes:
      - ${VOLUME_BASE}/minio:/data
    command: minio server /data --console-address ":9090"
    ports:
      - "9000:9000"
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - knowlebase-network

  # 图数据库：知识图谱、实体关系存储
  neo4j:
    image: neo4j:5.14.0
    container_name: knowlebase-neo4j
    # EXTENSION_SCRIPT 钩子：entrypoint 完成所有初始化后、neo4j console 启动前执行。
    # set_initial_password 会创建 store_lock，必须在此之后清理，否则误判 "already running"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-knowlebase_password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - EXTENSION_SCRIPT=/config/extension.sh
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - TZ=Asia/Shanghai
    volumes:
      # WSL ext4 bind mount，chown 原生速度，不再需要 named volume
      - ${VOLUME_BASE}/neo4j/data:/data
      - ./config/neo4j/extension.sh:/config/extension.sh:ro
      - ${VOLUME_BASE}/neo4j/plugins:/plugins
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      # 使用 wget 检查 HTTP 端口，比 cypher-shell（JVM 启动）快得多
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - knowlebase-network

  # AI 网关：统一 LLM 路由，模型与提供商解耦
  # 使用 all-in-one 镜像（自包含，无需 K8s），与 higress/higress（K8s 依赖）不同
  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:latest
    container_name: knowlebase-higress
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ${VOLUME_BASE}/higress:/data
    ports:
      - "8080:8080"
      - "8443:8443"
      - "8001:8001"
    networks:
      - knowlebase-network

networks:
  knowlebase-network:
    driver: bridge
