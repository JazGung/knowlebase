services:
  # 后端API服务（开发环境）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: knowlebase-backend
    environment:
      # 数据库连接
      - DATABASE_URL=postgresql://${POSTGRES_USER:-knowlebase}:${POSTGRES_PASSWORD:-knowlebase_password}@postgres:5432/${POSTGRES_DB:-knowlebase}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MILVUS_HOST=milvus
      - MILVUS_PORT=19530
      - NEO4J_URL=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-knowlebase_password}
      # 应用程序配置（从.env读取）
      - DEBUG=${DEBUG:-true}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-512}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - SEARCH_KEYWORD_WEIGHT=${SEARCH_KEYWORD_WEIGHT:-0.4}
      - SEARCH_SEMANTIC_WEIGHT=${SEARCH_SEMANTIC_WEIGHT:-0.4}
      - SEARCH_GRAPH_WEIGHT=${SEARCH_GRAPH_WEIGHT:-0.2}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - knowlebase-network

  # 前端开发服务（可选）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: knowlebase-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - knowlebase-network

networks:
  knowlebase-network:
    driver: bridge